<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Sistema de Agendamento</title>
    <!-- Fonte Moderna -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="senha.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <header class="auth-header">
                <div class="icon-header">🔑</div>
                <h2>Esqueceu a senha?</h2>
                <p>Insira seu e-mail cadastrado e enviaremos um link para você criar uma nova senha.</p>
            </header>

            <form class="form-body">
                <div class="input-group">
                    <label for="email">E-mail de Cadastro</label>
                    <input type="email" id="email" placeholder="exemplo@email.com" class="input-estilizado" required>
                </div>

                <button type="submit" class="btn-auth">Enviar Instruções</button>
            </form>
            
            <footer class="auth-footer">
                <span>Lembrou a senha? <a href="../tela de login/login.html">Voltar para o Login</a></span>
            </footer>
        </div>
    </div>

</body>
</html>
