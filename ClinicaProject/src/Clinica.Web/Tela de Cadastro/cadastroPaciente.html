<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Paciente - Sistema de Agendamento</title>
    <link rel="stylesheet" href="cadastroPaciente.css">
</head>
<body>

    <div class="auth-container">
        <form class="auth-box">
            <h2>Cadastro de Paciente</h2>
            <p>Crie sua conta para realizar agendamentos</p>

            <div class="input-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" placeholder="Digite seu nome" class="input-estilizado">
            </div>

            <div class="input-group">
    <label for="cpf">CPF</label>
    <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" class="input-estilizado">
            </div>

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" class="input-estilizado">
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Crie uma senha forte" class="input-estilizado">
            </div>

            <div class="lgpd-container">
                <input type="checkbox" id="checkLGPD">
                <label for="checkLGPD">Aceito os termos da <strong>LGPD</strong> e autorizo o tratamento dos meus dados para fins de agendamento.</label>
            </div>

            <button type="button" id="btnCadastrar" class="btn-auth" disabled>Cadastrar como Paciente</button>
            
            <div class="auth-footer" style="margin-top: 20px; font-size: 13px;">
                <span>Já tem conta? <a href="./login.html" style="color: #A7C27E; text-decoration: none; font-weight: bold;">Fazer Login</a></span>
            </div>
        </form>
    </div>

    <script src="cadastro.js"></script>
</body>
</html>
