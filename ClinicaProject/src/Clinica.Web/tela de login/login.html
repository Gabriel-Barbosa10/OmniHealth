<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Agendamento</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <!--CONTAINER PRINCIPAL(PARTE DE LOGIN/CAIXA DO LOGIN USER/TERAPEUTA) -->
    <div class="login-container">
        <form class="login-box">
            <h2 class="titulo_login">AgendaiFisio</h2>
            <h2>Acessar Conta</h2>
            <p>Entre com seu CPF e senha para agendar</p>
        <!--PARTE DO CPF CAMPO CPF COM MASCARA PELO JS E CPF -->
            <div class="input-group">
                <label for="cpfLogin">CPF</label>
                <input type="text" 
                       id="cpfLogin" 
                       placeholder="000.000.000-00" 
                       maxlength="14" 
                       class="input-estilizado"
                       required>
            </div>
        <!--CAMPO DA SENHA DE LOGIN-->
            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha" class="input-estilizado">
            </div>
        <!--BOTÃO DE ENTRAR COM ID PARA JS -->
            <button type="button" id="btnEntrar" class="btn-auth">Entrar</button>
        <!--ABRE A TELA DE ESQUECEU A SENHA E DE CADASTRAR UM USUARIO OU TERAPEUTA.-->
            <div class="auth-footer">
                <a href="../Tela de esqueceu a senha /esqueceu a senha.html">Esqueceu a senha?</a>
                <span>Não tem conta? <a href="../Tela de Cadastro/cadastro.html">Cadastre-se</a></span>
            </div>
        </form>
    </div>

    <script src="login.js"></script>
</body>
</html>
