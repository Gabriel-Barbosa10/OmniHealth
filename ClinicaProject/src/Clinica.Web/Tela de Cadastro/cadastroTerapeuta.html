<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Profissional - Sistema de Agendamento</title>
    <!-- Fonte Moderna -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="teladecadastro.css">
</head>
<body>

    <div class="auth-container">
        <!-- O Card Branco que centraliza tudo -->
        <div class="auth-card">
            <header class="auth-header">
                <h2>Cadastro Profissional</h2>
                <p>Crie seu perfil para gerenciar seus atendimentos</p>
            </header>

            <form class="form-body">
                <div class="input-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Digite seu nome completo" class="input-estilizado" required>
                </div>

                <div class="input-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" class="input-estilizado" required>
                </div>

                <div class="input-group">
                    <label for="especialidade">Registro Profissional (CRM/CRP)</label>
                    <input type="text" id="especialidade" placeholder="Ex: Psicólogo - CRP 00/000" class="input-estilizado" required>
                </div>

                <div class="input-group">
                    <label for="email">E-mail Profissional</label>
                    <input type="email" id="email" placeholder="seu@email.com" class="input-estilizado" required>
                </div>

                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Mínimo 6 caracteres" class="input-estilizado" required>
                </div>

                <!-- Checkbox Customizado -->
                <label class="lgpd-container">
                    <input type="checkbox" id="checkLGPD">
                    <span class="checkmark"></span>
                    <span class="lgpd-text">
                        Aceito os termos da <strong>LGPD</strong> e autorizo o tratamento dos dados.
                    </span>
                </label>

                <button type="button" id="btnCadastrar" class="btn-auth" disabled>Finalizar Cadastro</button>
            </form>
            
            <footer class="auth-footer">
                <span>Já possui conta? <a href="./login.html">Fazer Login</a></span>
            </footer>
        </div>
    </div>

    <script src="cadastro.js"></script>
</body>
</html>
