<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Paciente - Sistema de Agendamento</title>
    <link rel="stylesheet" href="teladecadastro.css">
    
</head>
<body>

    <div class="auth-card">
        <form class="auth-box">
            <h2>Cadastro de Paciente</h2>
            <p>Crie sua conta para realizar agendamentos</p>

            <div class="input-group">
                <label for="nomeCadastro">Nome Completo</label>
                <input type="text" id="nomeCadastro" placeholder="Digite seu nome" class="input-estilizado" required>
            </div>

            <div class="input-group">
                <label for="cpfCadastro">CPF</label>
                <input type="text" id="cpfCadastro" pattern="\d{3}\.\d{3}\.\d{3}-\d{2}"  placeholder="000.000.000-00" maxlength="14" class="input-estilizado" required>
            </div>

            <div class="input-group">
                <label for="emailCadastro">E-mail</label>
                <input type="email" id="emailCadastro" placeholder="seu@email.com" class="input-estilizado" required>
            </div>

            <div class="input-group">
                <label for="senhaCadastro">Senha</label>
                <input type="password"  id="senhaCadastro" placeholder="Crie uma senha forte" class="input-estilizado">
            </div>

                <label class="lgpd-container">
                    <input type="checkbox" id="checkLGPD">
                    <span class="checkmark"></span>
                    <span class="lgpd-text">
                        Aceito os termos da <strong>LGPD</strong> e autorizo o tratamento dos dados.
                    </span>
                </label>

            <button type="button" id="btnCadastrar" class="btn-auth" disabled>CADASTRAR</button>

            <dialog id="modalSucessoCadastro" class="modal-moderno">
                <h2>Cadastro com Sucesso</h2>
                <p>Seu cadastro foi realizado com sucesso! Seja bem vindo ao nosso sistema.</p>
                <button id="btnRedirecionar" href="../tela de login/login.html">Voltar ao Login</button>
            </dialog>
            <!-- NOVO: MODAL DE ERRO -->
            <dialog id="mnodalErro" class="modal-erro">
                <h2 style="color: #d32f2f;">Ops! Algo deu errado</h2>
                <p id="mensagemErro">Verifique os dados preenchidos.</p>
                <button onclick="this.closest('dialog').close()" class="btn-fechar">Tentar Novamente</button>
            </dialog>
            
            <div class="auth-footer" style="margin-top: 20px; font-size: 13px;">
                <span>Já tem conta? <a href="../tela de login/login.html" style="color: #A7C27E; text-decoration: none; font-weight: bold;">Fazer Login</a></span>
            </div>
        </form>
    </div>

    <script src="cadastro.js"></script>
</body>
</html>
