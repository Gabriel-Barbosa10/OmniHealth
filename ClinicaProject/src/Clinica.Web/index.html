<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <script src="./index.js" defer></script>
    <title>FisioPlan - Agendamento</title>
</head>
<body>
    <!-- Fundo decorativo sutil -->
    <div class="background-decor"></div>
    
    <div class="titulo-pagina">Agendamento de Sessão</div>

    <main class="Agendamento">
        <!-- Card Paciente -->
        <section class="card-info">
            <div class="badge-status">Paciente Ativo</div>
            <h2>Paciente</h2>
            <div class="dados-pessoais">
                <p><strong>Nome:</strong> <span id="nomePaciente">Davi Gusmão</span></p>
                <p><strong>Idade:</strong> 19 anos</p>
            </div>
        </section>

        <!-- Card Seleção de Fisioterapeuta -->
        <section class="card-info terapeuta">
            <div class="badge-status">Clínica de Fisioterapia</div>
            <h2>Fisioterapeuta</h2>
            <div class="acao-grupo">
                <select id="selectTerapeutaPrincipal" class="input-moderno">
                    <option value="">Selecione o Especialista...</option>
                    <option value="Dr. Davi Gusmão (Fisioterapia Esportiva)">Dr. Davi Gusmão (Fisioterapia Esportiva)</option>
                    <option value="Dra. Ana Freitas (RPG / Pilates)">Dra. Ana Freitas (RPG / Pilates)</option>
                    <option value="Dr. Adolfo Martins (Ortopedia)">Dr. Adolfo Martins (Ortopedia)</option>
                    <option value="Dra. Nubia Andrade (Neurofuncional)">Dra. Nubia Andrade (Neurofuncional)</option>
                </select>
                <button id="btnAbrir" class="btn-primario">Agendar Sessão</button>
            </div>
        </section>

        <!-- Modal de Agendamento (Popup) -->
        <dialog id="modalAgenda" class="modal-moderno">
            <!-- TOAST DE ERRO MOVIDO PARA DENTRO (Evita o borrão do backdrop) -->
            <div id="toastErro" class="toast-interno">
                <span style="font-size: 1.2rem;">⚠️</span>
                <div>
                    <strong style="display:block; color:#ef4444; font-size: 0.8rem;">Atenção</strong>
                    <p id="mensagemErro" style="margin:0; color:#64748b; font-size:0.85rem; font-weight: 600;">Mensagem de erro aqui...</p>
                </div>
            </div>

            <div class="modal-header">
                <h2>Nova Sessão</h2>
            </div>
            <div class="modal-body">
                <div class="passo">
                    <label>1. Profissional Responsável</label>
                    <select id="selectTerapeuta" class="input-moderno">
                        <option value="">Selecione...</option>
                        <option value="Dr. Davi Gusmão (Fisioterapia Esportiva)">Dr. Davi Gusmão (Fisioterapia Esportiva)</option>
                        <option value="Dra. Ana Freitas (RPG / Pilates)">Dra. Ana Freitas (RPG / Pilates)</option>
                        <option value="Dr. Adolfo Martins (Ortopedia)">Dr. Adolfo Martins (Ortopedia)</option>
                        <option value="Dra. Nubia Andrade (Neurofuncional)">Dra. Nubia Andrade (Neurofuncional)</option>
                    </select>
                </div>
                <div class="passo">
                    <label>2. Data do Atendimento</label>
                    <input type="date" id="dataAgendamento" class="input-moderno">
                </div>
                <div class="passo">
                    <label>3. Horários de Reabilitação</label>
                    <div id="containerHorarios" class="horarios-grid">
                        <!-- Gerado dinamicamente pelo JS -->
                    </div>
                </div>
            </div>
            <div class="modal-footer" style="padding: 0 35px 35px; display: flex; gap: 15px;">
                <button id="btnFechar" class="btn-primario" style="background: #f1f5f9; color: #5f7d7b; flex: 1;">Cancelar</button>
                <button id="confirmarAgendamento" class="btn-primario" style="flex: 1.5;">Confirmar Sessão</button>
            </div>
        </dialog>

        <!-- Modal de Sucesso -->
        <dialog id="modalSucesso" class="modal-moderno success-variant">
            <div class="icon-check">✓</div>
            <h2>Sessão Confirmada!</h2>
            <div id="dadosConfirmados" class="resumo-sucesso">
                <!-- Informações injetadas pelo JS -->
            </div>
            <div style="padding: 0 35px 35px;">
                <button onclick="location.reload()" class="btn-primario" style="width: 100%;">Voltar ao Início</button>
            </div>
        </dialog>
    </main>
</body>
</html>
